_min_copier_version: "9.0.0"
_subdirectory: template
_answers_file: .copier-answers.content-type.yml

_jinja_extensions:
  - copier_template_extensions.TemplateExtensionLoader
  - extensions.py:ParentPortalTypesHook

_plonecli:
  type: sub
  parent: backend_addon
  description: "Add a Dexterity content type"

_tasks:
  - command: "uv run --no-project --with tomlkit python3 {{ _copier_conf.src_path }}/copier_hooks.py validate '{{ _copier_conf.dst_path }}'"
    when: "{{ _copier_conf.operation == 'copy' }}"
  - "uv run --no-project --with tomlkit python3 {{ _copier_conf.src_path }}/copier_hooks.py post_copy '{{ _copier_conf.dst_path }}' '{{ content_type_name }}' '{{ content_type_description }}' '{{ parent_content_type_resolved }}'"

# Content type name
content_type_name:
  type: str
  help: "Content type name (e.g., 'News Item', 'Article')"
  validator: "{% if not content_type_name %}Content type name is required{% endif %}"

content_type_description:
  type: str
  help: "Short description of the content type"
  default: "A custom content type"

# Package info - read from parent addon
package_name:
  type: str
  help: "Parent addon package name"

package_folder:
  type: str
  help: "Parent addon package folder (e.g., collective/mypackage)"
  default: "{{ package_name | replace('.', '/') }}"

# Base class options
content_type_base:
  type: str
  help: "Base class for the content type"
  default: "Container"
  choices:
    - "Container"
    - "Item"

# Icon
content_type_icon:
  type: str
  help: "Bootstrap icon name (e.g., 'puzzle', 'file-earmark', 'folder', 'newspaper')"
  default: "puzzle"

# Addability
global_allow:
  type: bool
  help: "Should this type be globally addable?"
  default: true

# Parent content type (only when global_allow = false)
parent_content_type:
  type: str
  help: "Parent container portal type that should allow this new type"
  default: "Folder"
  choices: "{{ parent_content_type_choices }}"
  when: "{{ not global_allow }}"

parent_content_type_manual:
  type: str
  help: "Custom parent portal type name (e.g. 'MyContainer')"
  default: ""
  when: "{{ (not global_allow) and parent_content_type == '<enter manually>' }}"

# Computed: resolve parent_content_type to the final value
parent_content_type_resolved:
  type: str
  default: "{% if global_allow %}{% elif parent_content_type == '<enter manually>' %}{{ parent_content_type_manual }}{% else %}{{ parent_content_type }}{% endif %}"
  when: false

# Content type filtering (for Containers)
filter_content_types:
  type: bool
  help: "Filter allowed content types inside this container?"
  default: true
  when: "{{ content_type_base == 'Container' }}"

# Behaviors
activate_default_behaviors:
  type: bool
  help: "Activate standard Plone behaviors (metadata, locking, versioning, etc.)?"
  default: true

enable_dublin_core:
  type: bool
  help: "Enable Dublin Core metadata behavior?"
  default: true
  when: "{{ not activate_default_behaviors }}"

enable_navigation:
  type: bool
  help: "Enable navigation behavior (exclude from nav)?"
  default: true
  when: "{{ not activate_default_behaviors }}"

# Computed values
content_type_class:
  type: str
  default: "{{ content_type_name | replace(' ', '') | replace('-', '') | replace('_', '') }}"
  when: false

content_type_module:
  type: str
  default: "{{ content_type_name | lower | replace(' ', '_') | replace('-', '_') }}"
  when: false

content_type_interface:
  type: str
  default: "I{{ content_type_class }}"
  when: false

content_type_portal_type:
  type: str
  default: "{{ content_type_name }}"
  when: false
