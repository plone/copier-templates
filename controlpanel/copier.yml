_min_copier_version: "9.0.0"
_subdirectory: template
_answers_file: .copier-answers.controlpanel.yml

_plonecli:
  type: sub
  parent: backend_addon
  description: "Add a Plone control panel (registry-backed settings form)"

_tasks:
  - command: "uv run --with tomlkit python3 {{ _copier_conf.src_path }}/copier_hooks.py validate '{{ _copier_conf.dst_path }}'"
    when: "{{ _copier_conf.operation == 'copy' }}"
  - "uv run --with tomlkit python3 {{ _copier_conf.src_path }}/copier_hooks.py post_copy '{{ _copier_conf.dst_path }}' '{{ controlpanel_name }}'"

controlpanel_name:
  type: str
  help: "Control panel base name (PascalCase, e.g. 'MyFeatured')"
  default: "MyFeatured"
  validator: "{% if not controlpanel_name %}Control panel name is required{% endif %}"

controlpanel_title:
  type: str
  help: "Human-readable title shown in Plone's control panel list"
  default: "{{ controlpanel_name }}"

controlpanel_description:
  type: str
  help: "Short description of the control panel"
  default: "A custom control panel"

# Package info
package_name:
  type: str
  help: "Parent addon package name"

package_folder:
  type: str
  help: "Parent addon package folder (e.g., collective/mypackage)"
  default: "{{ package_name | replace('.', '/') }}"

# Computed: PascalCase -> snake_case module
controlpanel_module:
  type: str
  default: >-
    {%- set ns = namespace(out='') -%}
    {%- for ch in controlpanel_name -%}
    {%- if ch.isupper() and ns.out -%}
    {%- set ns.out = ns.out + '_' + ch|lower -%}
    {%- else -%}
    {%- set ns.out = ns.out + ch|lower -%}
    {%- endif -%}
    {%- endfor -%}
    {{ ns.out }}
  when: false

# Computed: PascalCase -> kebab-case URL id
controlpanel_url_id:
  type: str
  default: >-
    {%- set ns = namespace(out='') -%}
    {%- for ch in controlpanel_name -%}
    {%- if ch.isupper() and ns.out -%}
    {%- set ns.out = ns.out + '-' + ch|lower -%}
    {%- else -%}
    {%- set ns.out = ns.out + ch|lower -%}
    {%- endif -%}
    {%- endfor -%}
    {{ ns.out }}-controlpanel
  when: false
