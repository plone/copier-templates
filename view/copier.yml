_min_copier_version: "9.0.0"
_subdirectory: template
_answers_file: .copier-answers.view.yml

_jinja_extensions:
  - copier_template_extensions.TemplateExtensionLoader
  - extensions.py:ContentTypeInterfacesHook

_plonecli:
  type: sub
  parent: backend_addon
  description: "Add a BrowserView (with optional page template)"

_tasks:
  - command: "uv run --with tomlkit python3 {{ _copier_conf.src_path }}/copier_hooks.py validate '{{ _copier_conf.dst_path }}'"
    when: "{{ _copier_conf.operation == 'copy' }}"
  - command: "rm -f '{{ _copier_conf.dst_path }}/src/{{ package_folder }}/views/{{ view_module }}.pt'"
    when: "{{ not view_template }}"
  - "uv run --with tomlkit python3 {{ _copier_conf.src_path }}/copier_hooks.py post_copy '{{ _copier_conf.dst_path }}' '{{ view_name }}'"

# URL identifier for the view
view_name:
  type: str
  help: "View URL identifier (e.g. 'my-view', used as ``@@my-view``)"
  default: "my-view"
  validator: "{% if not view_name %}View name is required{% endif %}"

view_class_name:
  type: str
  help: "Python class name for the view (PascalCase, e.g. 'MyView')"
  default: "MyView"

view_base_class:
  type: str
  help: "Which base class the view should derive from"
  default: "BrowserView"
  choices:
    - BrowserView
    - DefaultView
    - CollectionView

view_template:
  type: bool
  help: "Generate an accompanying .pt page template?"
  default: true

view_for:
  type: str
  help: "Interface the view is registered for (dotted name or '*' for any)"
  default: "*"
  choices: "{{ view_for_choices }}"

view_for_manual:
  type: str
  help: "Custom interface dotted name (e.g. 'my.package.interfaces.IFoo')"
  default: "*"
  when: "{{ view_for == '<enter manually>' }}"
  validator: "{% if not view_for_manual %}Custom interface is required{% endif %}"

# Computed: resolve view_for to the final interface string
view_for_interface:
  type: str
  default: "{{ view_for_manual if view_for == '<enter manually>' else view_for }}"
  when: false

view_description:
  type: str
  help: "Short description of the view"
  default: "A custom browser view"

# Package info - read from parent addon
package_name:
  type: str
  help: "Parent addon package name"

package_folder:
  type: str
  help: "Parent addon package folder (e.g., collective/mypackage)"
  default: "{{ package_name | replace('.', '/') }}"

# Computed: PascalCase view class -> snake_case module
view_module:
  type: str
  default: >-
    {%- set ns = namespace(out='') -%}
    {%- for ch in view_class_name -%}
    {%- if ch.isupper() and ns.out -%}
    {%- set ns.out = ns.out + '_' + ch|lower -%}
    {%- else -%}
    {%- set ns.out = ns.out + ch|lower -%}
    {%- endif -%}
    {%- endfor -%}
    {{ ns.out }}
  when: false
