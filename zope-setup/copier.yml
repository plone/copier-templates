_min_copier_version: "9.0.0"
_subdirectory: template
_answers_file: .copier-answers.zope-setup.yml
_exclude:
  - "{% if _copier_operation == 'update' %}instance/inituser{% endif %}"

_jinja_extensions:
  - copier_template_extensions.TemplateExtensionLoader
  - extensions.py:AddonContextHook

_skip_if_exists:
  - pyproject.toml
  - README.md

_tasks:
  - "uv run --with tomlkit python3 {{ _copier_conf.src_path }}/tasks.py update_pyproject '{{ _copier_conf.dst_path }}' --plone-version={{ plone_version }} --distribution={{ distribution }} --db-storage={{ db_storage }}"

# Project identification
project_name:
  type: str
  help: "Project name (used for directory and package naming)"
  default: "{{ addon_context.package_name | default('') }}"
  validator: "{% if not project_name %}Project name is required{% endif %}"
  when: "{{ not addon_context }}"

project_title:
  type: str
  help: "Human-readable project title"
  default: "{{ addon_context.package_title | default(project_name | replace('-', ' ') | title) }}"
  when: "{{ not addon_context }}"

project_description:
  type: str
  help: "Short description of the project"
  default: "{{ addon_context.package_description | default('A Plone project') }}"
  when: "{{ not addon_context }}"

# Plone configuration
plone_version:
  type: str
  help: "Plone version to use"
  default: "6.1.1"
  choices:
    - "6.1.1"
    - "6.1.0"
    - "6.0.13"

distribution:
  type: str
  help: "Plone distribution to use"
  default: "plone.volto"
  choices:
    - "plone.volto"
    - "plone.classicui"

distribution_name:
  type: str
  default: "{% if distribution == 'plone.volto' %}volto{% elif distribution == 'plone.classicui' %}classic{% endif %}"
  when: false

# Database configuration
db_storage:
  type: str
  help: "Database storage backend"
  default: "direct"
  choices:
    - "direct"
    - "relstorage"
    - "blobs"

# Author information
author_name:
  type: str
  help: "Author name"
  default: "Plone Developer"

author_email:
  type: str
  help: "Author email"
  default: "dev@plone.org"

# Initial Zope user
initial_zope_username:
  type: str
  help: "Initial Zope username"
  default: "admin"

initial_user_password:
  type: str
  help: "Initial Zope password (default is admin)"
  default: "admin"
  secret: true

# Computed values
current_year:
  type: str
  default: "{{ '%Y' | strftime }}"
  when: false

current_date:
  type: str
  default: "{{ '%Y-%m-%d' | strftime }}"
  when: false
