_min_copier_version: "9.0.0"
_subdirectory: template
_answers_file: .copier-answers.zope-setup.yml

_plonecli:
  type: main
  aliases:
    - project
  description: "Create a Plone/Zope project structure"
_jinja_extensions:
  - copier_template_extensions.TemplateExtensionLoader
  - extensions.py:AddonContextHook
  - extensions.py:PloneVersionsHook

_skip_if_exists:
  - pyproject.toml
  - README.md

_tasks:
  - "uv run --no-project --with tomlkit python3 {{ _copier_conf.src_path }}/copier_hooks.py update_pyproject '{{ _copier_conf.dst_path }}' --plone-version={{ plone_version }} --distribution={{ distribution }} --db-storage={{ db_storage }} --base-path={{ base_path }}"
  - "uv run --no-project --with tomlkit python3 {{ _copier_conf.src_path }}/copier_hooks.py create_initial_instance '{{ _copier_conf.dst_path }}' --db-storage={{ db_storage }} --base-path={{ base_path }} --initial-zope-username={{ initial_zope_username }} --initial-user-password={{ initial_user_password }}{% if db_storage == 'zeo' %} --zeo-address={{ zeo_address }}{% endif %}{% if db_storage == 'relstorage' %} --pg-host={{ pg_host }} --pg-port={{ pg_port }} --pg-dbname={{ pg_dbname }} --pg-user={{ pg_user }}{% if pg_password %} --pg-password={{ pg_password }}{% endif %}{% endif %}"

# Project identification
project_name:
  type: str
  help: "Project name (used for directory and package naming)"
  default: "{{ addon_context.package_name | default('') }}"
  validator: "{% if not project_name %}Project name is required{% endif %}"
  when: "{{ not addon_context }}"

project_title:
  type: str
  help: "Human-readable project title"
  default: "{{ addon_context.package_title | default(project_name | replace('-', ' ') | title) }}"
  when: "{{ not addon_context }}"

project_description:
  type: str
  help: "Short description of the project"
  default: "{{ addon_context.package_description | default('A Plone project') }}"
  when: "{{ not addon_context }}"

# Plone configuration
plone_version:
  type: str
  help: "Plone version to use"
  default: "{{ plone_versions_full[0] }}"
  choices: "{{ plone_versions_full }}"

distribution:
  type: str
  help: "Plone distribution to use"
  default: "plone.volto"
  choices:
    - "plone.volto"
    - "plone.classicui"

distribution_name:
  type: str
  default: "{% if distribution == 'plone.volto' %}volto{% elif distribution == 'plone.classicui' %}classic{% endif %}"
  when: false

# Runtime directory
base_path:
  type: str
  help: "Base directory for runtime instances and servers (relative to project root)"
  default: "var"
  when: "{{ not addon_context }}"

# Database configuration
db_storage:
  type: str
  help: "Database storage backend"
  default: "instance"
  choices:
    - "instance"
    - "relstorage"
    - "zeo"
  when: "{{ not addon_context }}"

# ZEO connection settings (passed to zope_instance)
zeo_address:
  type: str
  help: "ZEO server address (host:port)"
  default: "localhost:8100"
  when: "{{ db_storage == 'zeo' }}"

# PostgreSQL / RelStorage connection settings (passed to zope_instance)
pg_host:
  type: str
  help: "PostgreSQL host"
  default: "localhost"
  when: "{{ db_storage == 'relstorage' }}"

pg_port:
  type: int
  help: "PostgreSQL port"
  default: 5432
  when: "{{ db_storage == 'relstorage' }}"

pg_dbname:
  type: str
  help: "PostgreSQL database name"
  default: "plone_{{ project_name | replace('-', '_') }}"
  when: "{{ db_storage == 'relstorage' }}"

pg_user:
  type: str
  help: "PostgreSQL user"
  default: "plone"
  when: "{{ db_storage == 'relstorage' }}"

pg_password:
  type: str
  help: "PostgreSQL password (leave empty for peer auth)"
  default: ""
  secret: true
  when: "{{ db_storage == 'relstorage' }}"

# Author information
author_name:
  type: str
  help: "Author name"
  default: "Plone Developer"

author_email:
  type: str
  help: "Author email"
  default: "dev@plone.org"

# Initial Zope user
initial_zope_username:
  type: str
  help: "Initial Zope username"
  default: "admin"

initial_user_password:
  type: str
  help: "Initial Zope password (default is admin)"
  default: "admin"
  secret: true

# Computed values
current_year:
  type: str
  default: "{{ '%Y' | strftime }}"
  when: false

current_date:
  type: str
  default: "{{ '%Y-%m-%d' | strftime }}"
  when: false
