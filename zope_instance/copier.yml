_min_copier_version: "9.0.0"
_subdirectory: template
_answers_file: ".copier-answers.zope-instance-{{ instance_name }}.yml"

_jinja_extensions:
  - copier_template_extensions.TemplateExtensionLoader
  - extensions.py:ProjectContextHook

_tasks:
  - "uv run --with tomlkit python3 {{ _copier_conf.src_path }}/copier_hooks.py validate '{{ _copier_conf.dst_path }}'"
  - "uv run --with tomlkit python3 {{ _copier_conf.src_path }}/copier_hooks.py post_copy '{{ _copier_conf.dst_path }}' '{{ instance_name }}' --port={{ port }}"

# Instance identification
instance_name:
  type: str
  help: "Instance directory name (e.g., instance, instance1, zeo-client1)"
  default: "instance"
  validator: "{% if not instance_name %}Instance name is required{% endif %}"

port:
  type: int
  help: "HTTP port for this instance"
  default: 8080

base_path:
  type: str
  help: "Base path for instance directory"
  default: "var/"

# Database configuration - read from project context or ask
db_storage:
  type: str
  help: "Database storage backend"
  default: "{{ project_context.db_storage | default('instance') }}"
  choices:
    - "instance"
    - "relstorage"
    - "zeo"

# ZEO connection settings
zeo_address:
  type: str
  help: "ZEO server address (host:port)"
  default: "localhost:8100"
  when: "{{ db_storage == 'zeo' }}"

# PostgreSQL / RelStorage connection settings
pg_host:
  type: str
  help: "PostgreSQL host"
  default: "localhost"
  when: "{{ db_storage == 'relstorage' }}"

pg_port:
  type: int
  help: "PostgreSQL port"
  default: 5432
  when: "{{ db_storage == 'relstorage' }}"

pg_dbname:
  type: str
  help: "PostgreSQL database name"
  default: "plone_{{ project_context.project_name | default('plone') | replace('-', '_') }}"
  when: "{{ db_storage == 'relstorage' }}"

pg_user:
  type: str
  help: "PostgreSQL user"
  default: "plone"
  when: "{{ db_storage == 'relstorage' }}"

pg_password:
  type: str
  help: "PostgreSQL password (leave empty for peer auth)"
  default: ""
  secret: true
  when: "{{ db_storage == 'relstorage' }}"

# Initial Zope user
initial_zope_username:
  type: str
  help: "Initial Zope admin username"
  default: "admin"

initial_user_password:
  type: str
  help: "Initial Zope admin password"
  default: "admin"
  secret: true

# Computed values (hidden from user)
project_name:
  type: str
  default: "{{ project_context.project_name | default('') }}"
  when: false

instance_home:
  type: str
  default: "{% if base_path %}{{ base_path }}/{{ instance_name }}{% else %}{{ instance_name }}{% endif %}"
  when: false
